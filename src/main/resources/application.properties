spring.application.name=HostelManagement

# In production (Render), set SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD
# as environment variables. These defaults only apply for local development
# against a local Postgres instance.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hostel}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Render injects PORT; default to 8080 for local dev
server.port=${PORT:8080}